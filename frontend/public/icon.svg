<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- White P letter as path - bold, centered -->
  <text
    x="256" y="360"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="310"
    font-weight="900"
    fill="white"
    letter-spacing="-10"
  >P</text>
  <!-- Small red accent stripe (Polish flag nod) -->
  <rect x="96" y="430" width="320" height="28" rx="14" fill="#dc2626" opacity="0.85"/>
</svg>
